version: '3.9'
services:
  postgres:
    image: 'postgres:14.10-alpine3.18'
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PORT: 5432
      POSTGRES_DB: mentormatch
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'

volumes:
  postgres-data: 